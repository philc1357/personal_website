# ─────────────────────────────────────────────────────────────────────────────
# GitHub Pages Deployment
# Baut den statischen Next.js-Export (out/) und deployt ihn auf GitHub Pages.
# Voraussetzung (einmalig im Repo): Settings → Pages → Source: "GitHub Actions".
# Der Build läuft mit GITHUB_PAGES=true, damit basePath=/personal_website greift.
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Rechte, die die offiziellen Pages-Actions benötigen (OIDC-Deploy).
permissions:
  contents: read
  pages: write
  id-token: write

# Parallele Deploys serialisieren; laufende Deploys nicht abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build: statischen Export erzeugen und als Pages-Artefakt hochladen.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deploy: hochgeladenes Artefakt auf GitHub Pages veröffentlichen.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
